name: Train ML Model & Build Docker

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  train_and_deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          pip install -r MLProject/requirements.txt

      - name: Run MLflow Project
        run: |
          cd MLProject
          mlflow run . --no-conda

      - name: Get Latest MLflow Run ID
        id: get_run_id
        run: |
          RUN_ID=$(cat MLProject/latest_run.txt)
          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV
          echo "Model berhasil dilatih dengan Run ID: $RUN_ID"

      - name: Upload Model Artifact to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: trained-model
          path: MLProject/mlruns

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Model Image via MLflow
        run: |
          cd MLProject
          mlflow models build-docker \
            -m mlruns/0/${{ env.RUN_ID }}/artifacts/model \
            -n shavel28/customer-personality-model:latest

      - name: Push Docker Image to Cloud
        run: |
          docker push shavel28/customer-personality-model:latest
